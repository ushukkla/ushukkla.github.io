  posts: [
    { id: "who-is-flying-the-plane", title: "Who Is Flying the Plane?", date: "2026 · 07", read: "9 min", excerpt: "Air France 447, cognitive debt, and the friction we keep paying to remove. What we lose when the machine works perfectly and hands us back the controls — and why somebody still has to remember how to fly.", body: [
      "On the night of 1 June 2009, somewhere over the Atlantic, three small tubes on the nose of an Airbus A330 iced over.",
      "That's it. That's the whole malfunction. The pitot tubes couldn't read airspeed, so the autopilot did the honest thing: it switched itself off and handed the aeroplane back to the men who were being paid to fly it.",
      "They had it for four minutes. In that time, Air France 447 climbed, stalled, and fell thirty-eight thousand feet into the sea. Two hundred and twenty-eight people died. The ice cleared within a minute. The machine was fine.",
      "What had degraded was the pilots.",
      "This is the shape of the thing I want to talk about. Not the horror-movie version where the machine turns on us. The quieter one, where the machine works perfectly, hands us back the controls, and we discover we've forgotten how.",
      "## Cognitive debt",
      "Last June, researchers at the MIT Media Lab wired up fifty-four people and had them write essays — some with ChatGPT, some with a search engine, some with nothing but their own heads. The brain-only group lit up: wide, distributed neural networks. The ChatGPT group showed the weakest connectivity of the three, remembered less of what they'd “written,” and reported little sense of ownership over it. By the third session, many were simply pasting the prompt in and pasting the answer out. Two English teachers, not told which was which, described those essays with a single word: soulless.",
      "The authors call it cognitive debt. I like that phrase because debt is not a wound. It's a deal. You get something now and pay later, and the paying-later feels, at the moment of borrowing, like an abstraction.",
      "It's one preprint, fifty-four people, one task. Don't build a religion on it. But it sits on top of something much older and much better established.",
      "Back in 2015, Fisher, Goddu and Keil ran nine experiments at Yale and found that people who looked something up online afterwards rated their own internal understanding as higher — not their access to information, their personal knowledge. Ask them how a zipper works and they feel they know. They don't. They know where to look. The mind, it turns out, is very bad at telling the difference between a thing it knows and a thing it can reach.",
      "Here is the part that should make the hair stand up: the effect showed up even when the search failed.",
      "We are not becoming stupider. We are becoming stupider while feeling smarter, which is a categorically worse position, because the first is a problem and the second is a problem that hides.",
      "## The friction was the point",
      "Ask any teacher what makes something stick and you'll get the same answer: struggle. Robert Bjork spent a career on this and gave it a name — desirable difficulties. Material that comes easily is forgotten easily. Retrieval, effort, the humiliating pause where you can't remember and have to reconstruct — that pause is not an obstacle to learning. That pause is the learning.",
      "Now notice what every product in your life is engineered to do.",
      "Eliminate the pause.",
      "This is why “AI makes me more productive” and “AI is degrading me” are not contradictory claims. They're the same claim. The tool removes friction. The friction was the mechanism. You are getting exactly what you paid for, and the price is coming out of an account you can't see.",
      "## The assessment mindset",
      "It gets stranger when it reaches love.",
      "By 2017, meeting online had become the single most common way American couples found each other. Not a fringe. The default. And in a long review of the psychological evidence, Eli Finkel and his colleagues put their finger on the mechanism that nobody wants to hear: browsing profiles induces an assessment mindset. You're not meeting a person. You're evaluating inventory. Height, income, jawline, filter. And a mind in assessment mode does something predictable — it keeps assessing. Commitment starts to feel like a failure to optimise.",
      "There is always a better option. There is always a better option, because the deck is infinite by design. So we swipe with the diligence of a fund manager, and we end up lonely with excellent taste.",
      "Byung-Chul Han says something harder. Love, he argues, requires the Other — someone genuinely outside you, who can wound you, who cannot be predicted. What the algorithm delivers instead is the Same: matched to your preferences, filtered to your revealed tastes, pre-approved. A mirror with a face. And you cannot fall in love with a mirror. You can only fall into it.",
      "## The exhibited self",
      "“The present age is essentially a sensible age, devoid of passion... it changes the expression of strength into a feat of dialectics.”",
      "Kierkegaard. 1846. He was complaining about newspapers. He watched a public form — a phantom, he called it, a crowd that is nobody — and he watched people begin to perform for it instead of living, gossiping about action rather than acting. He predicted the timeline with a hundred and seventy years to spare, and the only thing he got wrong was the scale.",
      "Sartre named the sensation: the Look. The moment you realise you are being seen, you stop being a subject and become an object — a thing with a shape, seen from outside. He thought this happened occasionally, in doorways, through keyholes.",
      "We built a machine that does it continuously, and we hold it eight inches from our faces.",
      "But here's the fact I'd put in bold if I only had one. In 2018, economists paid roughly 2,700 people to deactivate Facebook for four weeks. First, they asked what it was worth: most wanted around a hundred dollars to give it up for a month. The ones who actually quit came out the other side with higher life satisfaction, more time with family, less political polarisation — and afterwards, they used Facebook less and valued it lower than before.",
      "Read that again. They didn't know what it was worth until it was gone, and it was worth less than they thought. We are not addicted to something wonderful. We are addicted to something we systematically overprice, and the overpricing is not a rumour, it's measured. Herbert Simon saw it coming in 1971: information is not the scarce thing. Attention is. A wealth of one creates a poverty of the other.",
      "## The honest part",
      "Now the part the doom-merchants leave out, because it's inconvenient and I'd rather be useful than dramatic.",
      "The claim that phones caused a mental-health collapse is contested. Serious researchers — Candice Odgers among them — have pointed out that most of the evidence is correlational, the effect sizes are small, and the causal story is far weaker than the bestseller lists suggest. It might be true. It isn't established.",
      "I don't think it matters much, because the argument doesn't need it. The case isn't that these tools make us ill. The case is that they make us thin.",
      "Thin: capable of retrieving anything and understanding nothing. Fluent and unoriginal. Surrounded and unaccompanied. Endlessly assessing, never choosing. Very well informed about a world we are no longer in.",
      "## The controls",
      "I'm not going to tell you to delete anything. Detoxes are a genre, and genres are lies with a marketing budget.",
      "I'll tell you what the pilots needed, which is the only thing that has ever worked: hours on the stick. Not fewer machines. More flying.",
      "So: think a thought all the way through before you ask anything to help you. Sit in the pause. Let the name you're groping for stay lost for an hour — it will come back, and when it does it will be yours. Read the long thing. Meet the person who is not your type. Be bad at something in public, unassisted, where it costs you.",
      "Simone Weil said attention, absolutely unmixed, is the rarest and purest form of generosity. She meant it as an ethic. It has become, without anybody voting on it, a form of resistance.",
      "The autopilot is very good now. It will be better next year.",
      "Somebody has to remember how to fly."
    ]},
    { id: "the-well-organized-nothing", title: "The Well-Organized Nothing", date: "2026 · 07", read: "8 min", excerpt: "A man with a perfect system who hasn't made anything in four years. On productivity culture as a factory for camels — loss aversion, Goodhart's law, and the difference between discipline that has an owner and discipline that ate one.", body: [
      "I know a man with a perfect system.",
      "Five a.m. Cold shower. Protein number. Eleven thousand notes, tagged, linked, backed up twice. He has never missed a day. He has a dashboard that tells him, in green, that he is winning.",
      "He hasn't made anything in four years.",
      "He isn't lazy. That's the horror of it. He's a monument to effort. He took every gram of will he had and poured it into the machinery of preparation, and the machinery did what machinery does. It ran. Beautifully. Producing nothing but its own motion.",
      "Most of us are him.",
      "## The camel kneels",
      "Nietzsche said the spirit has three metamorphoses.",
      "First it becomes a camel. It kneels down and asks to be loaded, because carrying heavy things is how the weak prove they're strong. Then it becomes a lion, whose only holy word is No. The lion can't create yet, but it can kill the “thou shalt.” Only after that comes the child: forgetting, innocence, a sacred Yes.",
      "Productivity culture is a factory for camels.",
      "It's very good at getting you to kneel. It has an entire literature devoted to teaching you to ask for more weight — one more habit, one more protocol, one more optimization of the sleep you're having in order to be better at the work you aren't doing.",
      "And it is completely silent on the lion. It never teaches you to say No. It can't. Its whole economy depends on your next Yes.",
      "A civilization of camels with excellent posture. Very disciplined. Not one of them dangerous.",
      "## We answer the easier question",
      "Kahneman noticed that when a hard question is put to us, we don't answer it. We quietly swap it for an easy one and answer that instead, and we never notice the swap.",
      "The hard question, for anyone who makes anything, is: is this good?",
      "It has no metric. No dashboard. It requires taste, taste takes years, and it will humiliate you regularly.",
      "The easy question is: did I do the reps?",
      "So the swap gets made. Not cynically — nobody notices, that's the point. The streak is green, the word count is met, the commit graph is a wall of little squares, and the thing at the center of all that activity is mediocre in a way no system will ever tell you about. Because no system can. You can't measure taste, so you measure motion. Then you feel the motion as taste.",
      "Goodhart said a measure that becomes a target stops being a measure. He was talking about central banks. Nobody warned us a single human being could do it to himself, hit every target he set, hollow out the thing the targets were pointing at, and call the hollowing discipline.",
      "## The streak is a hostage situation",
      "Losing hurts about twice as much as winning feels good. That's the most reliable finding in the whole literature on how people actually behave, and the productivity industry has weaponized it.",
      "The streak. The chain you mustn't break. The little flame.",
      "Day sixty. You sit down tired. You can make the real thing — which might fail, which might take three days before it's worth anything, which might produce nothing visible today — or you can do the cheap version, the safe version, the one that's definitely finishable in forty minutes.",
      "You'll keep the flame alive. Of course you will. Sixty days are sitting on the other side of the scale.",
      "And there it is. Loss aversion turns creation into insurance. You're not making anymore. You're protecting an asset. You're a man guarding a candle in a wind, and you will not walk into the dark room where the interesting things are, because it's windy in there.",
      "## The blank page isn't a problem to be solved",
      "Sartre's waiter is too eager. Too crisp with the tray, too precise with the bow. He is playing at being a waiter, and he's doing it because being simply a man — free, undefined, responsible — is unbearable. So he hides inside a function.",
      "Watch the productivity guy. The template. The morning stack. The identity: I'm someone who ships.",
      "Too crisp with the tray.",
      "He's fleeing what the waiter is fleeing. The dread you feel at the blank page is not a defect in your workflow. It's the honest experience of being free. Nothing tells you what to make. Nothing promises it'll be good. Nothing will absolve you afterward.",

      "We eliminated the only conditions under which the thing can happen, in order to get more of the thing.",
      "## The things you build end up building you",
      "Tyler Durden says self-improvement is masturbation. He's right, and for a more precise reason than he lets on: both perfectly simulate the shape of the real act while guaranteeing nothing is created and nobody is risked.",

      "The question was never discipline versus freedom. It's whose discipline, and for what.",

function bookCover(b, i){
  const p = BOOK_PALETTE[i % BOOK_PALETTE.length];
  const q = b.title + " " + b.author;
  const local = COVERS[b.title];
  const fallback = '<div class="bk-fallback" style="position:absolute;inset:0;background:' + p.bg + ";color:" + p.fg + ';padding:18px 16px;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .4s ease">' +
      '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:18px;line-height:1.12;letter-spacing:-.02em">' + b.title + "</div>" +
      '<div><div style="width:26px;height:3px;background:' + p.fg + ';opacity:.75;margin-bottom:9px"></div>' +
        '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:9.5px;letter-spacing:.04em;opacity:.85;line-height:1.35">' + b.author + "</div></div>" +
    "</div>";
  const img = local ? '<img src="' + encodeURI(local) + '" loading="lazy" alt="' + b.title.replace(/"/g, "&quot;") + ' cover" onload="var f=this.parentNode.querySelector(\'.bk-fallback\'); if(f){f.style.opacity=0;}" onerror="this.remove();" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:1">' : "";
  return '<div class="bk-cover" data-q="' + encodeURIComponent(q) + '" data-title="' + encodeURIComponent(b.title) + '" data-author="' + encodeURIComponent(b.author || "") + '"' + (local ? ' data-local="1"' : "") + ' style="position:relative;width:100%;aspect-ratio:2/3;box-shadow:0 12px 26px -18px rgba(0,0,0,.6);background:#d8d5cd;background-size:cover;background-position:center;overflow:hidden">' +
    fallback + img +
  "</div>";
}

function loadBookCovers(){
  document.querySelectorAll(".bk-cover").forEach(function(el){
    if(el.dataset.loaded) return;
    if(el.dataset.local) return;
    el.dataset.loaded = "1";
    var q = decodeURIComponent(el.getAttribute("data-q"));
    var title = decodeURIComponent(el.getAttribute("data-title") || "");
    var author = decodeURIComponent(el.getAttribute("data-author") || "");

    function apply(url){
      var im = new Image();
      im.onload = function(){
        // ignore Open Library's 1x1 "no cover" placeholder
        if(im.naturalWidth <= 2 || im.naturalHeight <= 2){ tryGoogle(); return; }
        el.style.backgroundImage = 'url("' + url + '")';
        var fb = el.querySelector(".bk-fallback");
        if(fb) fb.style.opacity = "0";
      };
      im.onerror = function(){ tryGoogle(); };
      im.src = url;
    }

    var googleTried = false;
    function tryGoogle(){
      if(googleTried) return; googleTried = true;
      fetch("https://www.googleapis.com/books/v1/volumes?country=US&maxResults=5&q=" + encodeURIComponent(q))
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(j){
          if(!j || !j.items) return;
          var url = null;
          for(var k=0;k<j.items.length;k++){
            var links = j.items[k].volumeInfo && j.items[k].volumeInfo.imageLinks;
            if(links){ url = links.thumbnail || links.smallThumbnail; if(url) break; }
          }
          if(!url) return;
          url = url.replace(/^http:/, "https:").replace("&edge=curl", "");
          var im = new Image();
          im.onload = function(){
            el.style.backgroundImage = 'url("' + url + '")';
            var fb = el.querySelector(".bk-fallback");
            if(fb) fb.style.opacity = "0";
          };
          im.src = url;
        })
        .catch(function(){});
    }

    // Source 1: Open Library (search -> cover id), then fall back to Google Books
    var ol = "https://openlibrary.org/search.json?limit=1&fields=cover_i&title=" +
      encodeURIComponent(title) + (author ? "&author=" + encodeURIComponent(author) : "");
    fetch(ol)
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        var doc = j && j.docs && j.docs[0];
        if(doc && doc.cover_i){ apply("https://covers.openlibrary.org/b/id/" + doc.cover_i + "-L.jpg"); }
        else { tryGoogle(); }
      })
      .catch(function(){ tryGoogle(); });
  });
}

function bindHovers(root){
  root.querySelectorAll("[data-h]").forEach(function(el){
    const base = el.getAttribute("style") || "";
    const hover = el.getAttribute("data-h");
    el.addEventListener("mouseenter", function(){ el.setAttribute("style", base + ";" + hover); });
    el.addEventListener("mouseleave", function(){ el.setAttribute("style", base); });
  });
}

  el.offsetHeight; // reflow
  el.textContent = DATA.lines[state.li];
  el.style.animation = "triviaIn .6s ease both";
}
function updateTrivia(){
  const light = document.getElementById("triviaLight");
  const num = document.getElementById("triviaNum");
  const cur = DATA.trivia[state.ti];
  if(num) num.textContent = "№ " + cur.n;
  if(!light) return;
  light.style.animation = "none";
  light.offsetHeight;
  light.textContent = cur.t;
  light.style.animation = "triviaIn .6s ease both";
}
function manageTimers(){
  if(lineTimer){ clearInterval(lineTimer); lineTimer = null; }
  if(triviaTimer){ clearInterval(triviaTimer); triviaTimer = null; }
}

/* ---------------- EVENTS ---------------- */
document.getElementById("app").addEventListener("click", function(e){
  const nav = e.target.closest("[data-nav]");
  if(nav){ go(nav.getAttribute("data-nav")); return; }
  const post = e.target.closest("[data-post]");
  if(post){ openPost(post.getAttribute("data-post")); return; }
  const action = e.target.closest("[data-action]");
  if(action){
    const act = action.getAttribute("data-action");
    if(act === "backWriting"){ state.post = null; window.scrollTo({ top: 0 }); render(); return; }
    if(act === "toggleMenu"){
      const navEl = action.closest("nav");
      if(navEl){ const open = navEl.classList.toggle("open"); action.setAttribute("aria-expanded", open ? "true" : "false"); }
      return;
    }
  }
});

render();
</script>
</body>
</html>
